name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (dev mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Lint
        run: bunx @biomejs/biome check .

  binary:
    name: Binary E2E
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun run build

      - name: Copy WASM sidecars
        run: |
          cp node_modules/web-tree-sitter/web-tree-sitter.wasm dist/
          cp node_modules/tree-sitter-typescript/tree-sitter-typescript.wasm dist/

      - name: Install fixture dependencies
        run: |
          mkdir -p fixtures/simple-ts/node_modules
          cp -r node_modules/typescript fixtures/simple-ts/node_modules/typescript

      - name: E2E — build fixture
        run: ./dist/nexphy build ./fixtures/simple-ts

      - name: E2E — query
        run: |
          set -euo pipefail
          ./dist/nexphy query greet --db ./fixtures/simple-ts/.nexphy.db > /tmp/query-out.json
          grep -q '"name"' /tmp/query-out.json
          grep -q 'greet' /tmp/query-out.json

      - name: E2E — explain-edges
        run: |
          set -euo pipefail
          ./dist/nexphy explain-edges > /tmp/edges-out.json
          grep -q 'edge_kinds' /tmp/edges-out.json

      - name: Cleanup fixture DB
        if: always()
        run: rm -f fixtures/simple-ts/.nexphy.db fixtures/simple-ts/.nexphy.db-wal fixtures/simple-ts/.nexphy.db-shm

  node-bundle:
    name: Node bundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Node bundle
        run: bun run build:node

      - name: Smoke test — CLI responds under Node.js
        run: node dist/node/cli.js --help 2>&1 | grep -q "Usage\|tsgraph\|nexphy\|Commands\|build\|query"

      - name: Test (Node.js)
        run: npm run test:node

      - name: Install fixture dependencies
        run: |
          mkdir -p fixtures/simple-ts/node_modules
          cp -r node_modules/typescript fixtures/simple-ts/node_modules/typescript

      - name: E2E — build fixture under Node.js
        run: node dist/node/cli.js build ./fixtures/simple-ts

      - name: Cleanup fixture DB
        if: always()
        run: rm -f fixtures/simple-ts/.nexphy.db fixtures/simple-ts/.nexphy.db-wal fixtures/simple-ts/.nexphy.db-shm
