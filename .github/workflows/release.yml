name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Node bundle
        run: bun run build:node

      - name: Build platform binaries
        run: bun run build:bins

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>/dev/null \
            || gh release create "${{ github.ref_name }}" \
                 --title "nexphy ${{ github.ref_name }}" \
                 --generate-notes \
                 dist/nexphy-linux-x64.zip \
                 dist/nexphy-linux-arm64.zip \
                 dist/nexphy-macos-arm64.zip \
                 dist/nexphy-windows-x64.zip

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          bun publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
